spring.application.name=step3-JWT

# DB
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/${DB_USERNAME}?serverTimezone=Asia/Seoul&useSSL=false
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# MyBatis
mybatis.configuration.map-underscore-to-camel-case=true
mybatis.type-aliases-package=com.auth.domain
mybatis.mapper-locations=classpath:mapper/*.xml

# Thymeleaf
spring.thymeleaf.cache=false

# Logging (개발용)
logging.level.org.springframework.web=DEBUG
logging.level.org.thymeleaf=DEBUG
logging.level.com.auth.handler=DEBUG
logging.level.org.springframework.security=DEBUG

# Error (보안 고려)
server.error.include-stacktrace=on_param
server.error.include-message=on_param
server.error.include-exception=false

# 2차 인증코드
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# 디버그 (처음엔 켜라)
spring.mail.properties.mail.debug=true

# remember-me key (JWT 대체)
# security.rememberme.key=my-remember-me-secret-key-2026

# JWT
jwt.secret=${JWT_SECRET}
jwt.access-token-validity-ms=1800000
jwt.refresh-token-validity-ms=604800000

# secret
spring.profiles.include=secret