spring.application.name=step2-security

# DB
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/aloha?serverTimezone=Asia/Seoul&useSSL=false
spring.datasource.username=aloha
spring.datasource.password=123456

# MyBatis
mybatis.configuration.map-underscore-to-camel-case=true
mybatis.type-aliases-package=com.auth.domain
mybatis.mapper-locations=classpath:mapper/*.xml

# Thymeleaf
spring.thymeleaf.cache=false

# Logging (개발용)
logging.level.org.springframework.web=DEBUG
logging.level.org.thymeleaf=DEBUG
logging.level.com.auth.handler=DEBUG
logging.level.org.springframework.security=DEBUG

# Error (보안 고려)
server.error.include-stacktrace=on_param
server.error.include-message=on_param
server.error.include-exception=false

# 2차 인증코드
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=aya70713@gmail.com
spring.mail.password=${MAIL_PASSWORD}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# 디버그 (처음엔 켜라)
spring.mail.properties.mail.debug=true