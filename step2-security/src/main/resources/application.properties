spring.application.name=step2-security

# DB
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/aloha?serverTimezone=Asia/Seoul&useSSL=false
spring.datasource.username=aloha
spring.datasource.password=123456

# MyBatis
mybatis.configuration.map-underscore-to-camel-case=true
mybatis.type-aliases-package=com.auth.domain
mybatis.mapper-locations=classpath:mapper/*.xml

# Thymeleaf
spring.thymeleaf.cache=false

# Logging (개발용)
logging.level.org.springframework.web=DEBUG
logging.level.org.thymeleaf=DEBUG
logging.level.com.auth.handler=DEBUG
logging.level.org.springframework.security=DEBUG

# Error (보안 고려)
server.error.include-stacktrace=on_param
server.error.include-message=on_param
server.error.include-exception=false