<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>마이페이지</title>
    <!-- CSRF 토큰 (활성화 시 사용) -->
    <meta name="_csrf" th:content="${_csrf?.token}" />
    <meta name="_csrf_header" th:content="${_csrf?.headerName}" />
</head>

<body>
    <h2>마이페이지</h2>
    <!-- 회원 정보 -->
    <div>
        <p>이메일: <span th:text="${user.email}"></span></p>
        <p>이름: <span th:text="${user.name}"></span></p>
    </div>

    <hr>

    <!-- 비밀번호 변경 -->
    <h3>비밀번호 변경</h3>
    <div>
        <input type="password" id="password" placeholder="현재 비밀번호" />
    </div>
    <div>
        <input type="password" id="newPassword" placeholder="새 비밀번호" />
    </div>
    <button onclick="changePassword()" id="btn">비밀번호 변경</button>
    <p id="msg"></p>

    <hr>

    <form method="post" action="/logout">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
        <button type="submit">로그아웃</button>
    </form>

    <script>
        function changePassword() {
            const password = document.getElementById("password").value;
            const newPassword = document.getElementById("newPassword").value;

            const btn = document.getElementById("btn");
            const msg = document.getElementById("msg");

            btn.disabled = true;
            btn.innerText = "처리 중...";

            // CSRF 토큰 준비 (활성화 시)
            const headers = {
                "Content-Type": "application/json"
            };
            const csrfMeta = document.querySelector("meta[name='_csrf']");
            if (csrfMeta && csrfMeta.content) {
                const headerMeta = document.querySelector("meta[name='_csrf_header']");
                if (headerMeta && headerMeta.content) {
                    headers[headerMeta.content] = csrfMeta.content;
                }
            }
            // 빈값 유효성 검사
            if (!password || !newPassword) {
                msg.innerText = "모든 값을 입력하세요";
                msg.style.color = "red";
                btn.disabled = false;
                btn.innerText = "비밀번호 변경";
                return;
            }
            // 동일 비밀번호 유효성 검사
            if (password === newPassword) {
                msg.innerText = "기존 비밀번호와 동일합니다";
                msg.style.color = "red";
                btn.disabled = false;
                btn.innerText = "비밀번호 변경";
                return;
            }
            // 짧은 비밀번호 유효성 검사
            if (newPassword.length < 8) {
                msg.innerText = "비밀번호는 8자 이상";
                msg.style.color = "red";
                btn.disabled = false;
                btn.innerText = "비밀번호 변경";
                return;
            }

            fetch("/api/password", {
                method: "POST",
                headers: headers,
                body: JSON.stringify({
                    password: password,
                    newPassword: newPassword
                })
            })
                .then(res => {
                    if (!res.ok) throw new Error("서버 오류");
                    return res.json();
                })
                .then(data => {
                    if (data.success) {
                        success = true;

                        msg.innerText = "비밀번호 변경 성공";
                        msg.style.color = "green";

                        document.getElementById("password").value = "";
                        document.getElementById("newPassword").value = "";

                        btn.innerText = "변경 완료";
                    } else {
                        msg.innerText = data.message || "실패";
                        msg.style.color = "red";
                    }
                })
                .catch(() => {
                    msg.innerText = "요청 실패";
                    msg.style.color = "red";
                })
                .finally(() => {
                    btn.disabled = false;

                    if (!success) {
                        btn.innerText = "비밀번호 변경";
                    }
                });
        }
    </script>

</body>

</html>
