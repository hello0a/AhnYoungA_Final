<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>로그인</title>
</head>

<body>
    <h2>로그인</h2>
    <!-- 🔥 에러 메시지 -->
    <div th:if="${error}" style="color:red;">
        <p th:text="${error}"></p>
    </div>

    <div th:if="${param.fail}">
        <p style="color: orange;">
            비밀번호 오류 (<span th:text="${param.fail}"></span>회)
        </p>
    </div>

    <div th:if="${param.locked}">
        <p style="color: red;">
            계정이 잠겼습니다. 관리자에게 문의하세요.
        </p>
    </div>

    <form method="post" action="/login">
        <!-- CSRF (Spring Security 필수) -->
        <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
        <div>
            <input type="email" name="email" placeholder="이메일" th:value="${param.email}" required />
        </div>
        <div>
            <input type="password" name="password" placeholder="비밀번호" required />
        </div>
        <!-- 🔥 remember-me -->
        <div>
            <label>
                <input type="checkbox" name="remember-me" /> 자동 로그인
            </label>
        </div>

        <button type="submit" onclick="this.disabled=true; this.form.submit();">로그인</button>
    </form>

    <!-- 🔥 추가 -->
    <a href="/signup">회원가입</a>
    <a href="/password-reset">비밀번호 찾기</a>
</body>

</html>
