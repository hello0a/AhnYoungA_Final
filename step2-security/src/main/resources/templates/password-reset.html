<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>비밀번호 재설정</title>
    <!-- CSRF 토큰 (활성화 시 사용) -->
    <meta name="_csrf" th:content="${_csrf?.token}" />
    <meta name="_csrf_header" th:content="${_csrf?.headerName}" />
</head>

<body>
    <h2>비밀번호 재설정</h2>
    <div>
        <input type="email" id="email" placeholder="이메일">
        <button onclick="sendCode()">인증 코드 발송</button>
    </div>
    <div>
        <input type="text" id="code" placeholder="인증코드">
    </div>
    <div>
        <input type="password" id="newPassword" placeholder="새 비밀번호">
    </div>
    <button onclick="resetPassword()">비밀번호 변경</button>
    <p id="msg"></p>

    <script>
        function sendCode() {
            // CSRF 토큰 준비 (활성화 시)
            const headers = { "Content-Type": "application/json" };
            const csrfMeta = document.querySelector("meta[name='_csrf']");
            if (csrfMeta && csrfMeta.content) {
                const headerMeta = document.querySelector("meta[name='_csrf_header']");
                if (headerMeta && headerMeta.content) {
                    headers[headerMeta.content] = csrfMeta.content;
                }
            }

            fetch("/email/send", {
                method: "POST",
                headers: headers,
                body: JSON.stringify({
                    email: document.getElementById("email").value
                })
            })
                .then(res => res.json())
                .then(data => {
                    const msg = document.getElementById("msg");
                    if (data.success) {
                        msg.innerText = "인증 코드 발송 완료 → 코드 입력하세요";
                        msg.style.color = "green";
                    } else {
                        msg.innerText = data.message || "코드 발송 실패";
                        msg.style.color = "red";
                    }
                })
                .catch(() => {
                    const msg = document.getElementById("msg");
                    msg.innerText = "요청 중 오류 발생";
                    msg.style.color = "red";
                });
        }
        function resetPassword() {
            // CSRF 토큰 준비 (활성화 시)
            const headers = { "Content-Type": "application/json" };
            const csrfMeta = document.querySelector("meta[name='_csrf']");
            if (csrfMeta && csrfMeta.content) {
                const headerMeta = document.querySelector("meta[name='_csrf_header']");
                if (headerMeta && headerMeta.content) {
                    headers[headerMeta.content] = csrfMeta.content;
                }
            }

            fetch("/api/password/reset", {
                method: "POST",
                headers: headers,
                body: JSON.stringify({
                    email: document.getElementById("email").value,
                    code: document.getElementById("code").value,
                    newPassword: document.getElementById("newPassword").value
                })
            })
                .then(res => res.json())
                .then(data => {
                    const msg = document.getElementById("msg");

                    if (data.success) {
                        msg.innerText = "비밀번호 변경 성공";
                        msg.style.color = "green";

                        // 입력값 초기화
                        document.getElementById("email").value = "";
                        document.getElementById("code").value = "";
                        document.getElementById("newPassword").value = "";

                        setTimeout(() => {
                            window.location.href = "/login";
                        }, 1500);
                    } else {
                        msg.innerText = data.message || "실패";
                        msg.style.color = "red";
                    }
                });
        }
    </script>
</body>

</html>
