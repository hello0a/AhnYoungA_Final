<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>비밀번호 재설정</title>
</head>
<body>
    <h2>비밀번호 재설정</h2>
    <div>
        <input type="email" id="email" placeholder="이메일">
        <button onclick="sendCode()">인증 코드 발송</button>
    </div>
    <div>
        <input type="text" id="code" placeholder="인증코드">
    </div>
    <div>
        <input type="password" id="newPassword" placeholder="새 비밀번호">
    </div>
    <button onclick="resetPassword()">비밀번호 변경</button>
    <p id="msg"></p>

    <script>
        function sendCode() {
            fetch("/email/send", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    email: document.getElementById("email").value
                })
            })
            .then(res => res.json())
            .then(data => {
                const msg = document.getElementById("msg");
                if (data.success) {
                    msg.innerText = "인증 코드 발송 완료";
                    msg.style.color = "green";
                } else {
                    msg.innerText = data.message || "코드 발송 실패";
                    msg.style.color = "red";
                }
            })
            .catch(() => {
                const msg = document.getElementById("msg");
                msg.innerText = "요청 중 오류 발생";
                msg.style.color = "red";
            });
        }
        function resetPassword() {
            fetch("/api/password/reset", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    email: document.getElementById("email").value,
                    code: document.getElementById("code").value,
                    newPassword: document.getElementById("newPassword").value
                })
            })
            .then(res => res.json())
            .then(data => {
                const msg = document.getElementById("msg");

                if (data.success) {
                    msg.innerText = "비밀번호 변경 성공";
                    msg.style.color = "green";
                } else {
                    msg.innerText = data.message || "실패";
                    msg.style.color = "red";
                }
            });
        }
    </script>
</body>
</html>
