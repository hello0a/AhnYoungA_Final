<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>비밀번호 재설정</title>
    <!-- CSRF 토큰 (활성화 시 사용) -->
    <meta name="_csrf" th:content="${_csrf?.token}" />
    <meta name="_csrf_header" th:content="${_csrf?.headerName}" />
</head>

<body>
    <h2>비밀번호 재설정</h2>
    <div>
        <input type="email" id="email" placeholder="이메일" />
        <button onclick="sendCode()">인증 코드 발송</button>
    </div>
    <div>
        <input type="text" id="code" placeholder="인증코드" />
        <button onclick="verifyCode()">인증코드 확인</button>
        <p id="timer"></p>
    </div>
    <div>
        <input type="password" id="newPassword" placeholder="새 비밀번호" disabled />
    </div>
    <button onclick="resetPassword()">비밀번호 변경</button>
    <p id="msg"></p>

    <script>

        let isVerified = false;
        let timer = null;
        let timeLeft = 300;    // 5분

        function sendCode() {
            // CSRF 토큰 준비 (활성화 시)
            const headers = { "Content-Type": "application/json" };
            const csrfMeta = document.querySelector("meta[name='_csrf']");

            const msg = document.getElementById("msg");

            if (csrfMeta && csrfMeta.content) {
                const headerMeta = document.querySelector("meta[name='_csrf_header']");
                if (headerMeta && headerMeta.content) {
                    headers[headerMeta.content] = csrfMeta.content;
                }
            }

            fetch("/email/send", {
                method: "POST",
                headers: headers,
                body: JSON.stringify({
                    email: document.getElementById("email").value
                })
            })
                .then(res => res.json())
                .then(data => {
                    if (data.success) {
                        msg.innerText = "인증코드가 이메일로 전송되었습니다";
                        msg.style.color = "green";

                        startTimer();
                    } else {
                        msg.innerText = data.message || "코드 발송 실패";
                        msg.style.color = "red";
                    }
                })
                .catch(() => {
                    msg.innerText = "요청 중 오류 발생";
                    msg.style.color = "red";
                });
        }
        function resetPassword() {
            // CSRF 토큰 준비 (활성화 시)
            const headers = { "Content-Type": "application/json" };
            const csrfMeta = document.querySelector("meta[name='_csrf']");

            const msg = document.getElementById("msg");

            if (csrfMeta && csrfMeta.content) {
                const headerMeta = document.querySelector("meta[name='_csrf_header']");
                if (headerMeta && headerMeta.content) {
                    headers[headerMeta.content] = csrfMeta.content;
                }
            }

            if (!isVerified) {
                msg.innerText = "인증코드 확인 먼저 해주세요";
                msg.style.color = "red";
                return;
            }

            fetch("/api/password/reset", {
                method: "POST",
                headers: headers,
                body: JSON.stringify({
                    email: document.getElementById("email").value,
                    code: document.getElementById("code").value,
                    newPassword: document.getElementById("newPassword").value
                })
            })
                .then(res => res.json())
                .then(data => {
                    const msg = document.getElementById("msg");

                    if (data.success) {
                        msg.innerText = "비밀번호 변경 성공";
                        msg.style.color = "green";

                        // 입력값 초기화
                        document.getElementById("email").value = "";
                        document.getElementById("code").value = "";
                        document.getElementById("newPassword").value = "";

                        setTimeout(() => {
                            window.location.href = "/login";
                        }, 1500);
                    } else {
                        msg.innerText = data.message || "실패";
                        msg.style.color = "red";
                    }
                });
        }
        function verifyCode() {

            const headers = { "Content-Type": "application/json" }

            const csrfMeta = document.querySelector("meta[name='_csrf']");
            if (csrfMeta && csrfMeta.content) {
                const headerMeta = document.querySelector("meta[name='_csrf_header']");
                if (headerMeta && headerMeta.content) {
                    headers[headerMeta.content] = csrfMeta.content;
                }
            }

            fetch("/email/verify", {
                method: "POST",
                headers: headers,
                body: JSON.stringify({
                    email: document.getElementById("email").value,
                    code: document.getElementById("code").value
                })
            })
                .then(res => res.json())
                .then(data => {
                    const msg = document.getElementById("msg");

                    if (data.success) {
                        isVerified = true;

                        msg.innerText = "인증 성공";
                        msg.style.color = "green";

                        // 비밀번호 입력 활성화
                        document.getElementById("newPassword").disabled = false;
                    } else {
                        isVerified = false;

                        msg.innerText = data.message || "인증 실패"
                        msg.style.color = "red";
                    }
                });

        }
        function startTimer() {

            const timerEl = document.getElementById("timer");

            clearInterval(timer);
            timeLeft = 300;

            timer = setInterval(() => {
                const min = Math.floor(timeLeft / 60);
                const sec = timeLeft % 60;

                timerEl.innerText = `남은 시간: ${min}:${sec.toString().padStart(2, '0')}`;

                if (timeLeft <= 0) {
                    clearInterval(timer);
                    timerEl.innerText = "인증시간 만료";
                    isVerified = false;
                }

                timeLeft--;

            }, 1000);
        }
    </script>
</body>

</html>
